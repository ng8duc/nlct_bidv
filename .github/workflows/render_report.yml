name: Render Daily Report

on:
  schedule:
    - cron: '22 22 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  render-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Enables fast R package binary downloads on Linux

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite", "glue", "tidyverse", "plotly", "dotenv", "here", "highcharter", "targets", "tarchetypes", "quarto", "timetk"))'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Create .env from example
        run: |
          grep -v '^CLOUDFLARE_API_TOKEN=\|^CLOUDFLARE_ACCOUNT_ID=' .env.example > .env

      - name: Run Targets Pipeline (Fetch DB & Render)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          Rscript -e "targets::tar_make()"

      - name: Prepare build directory
        run: |
          mkdir -p build
          cp report.html build/index.html
          cp report.html build/report.html
          if [ -d "report_files" ]; then cp -r report_files build/; fi
          cp -r assets build/

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy build --project-name=nlctbidv --branch=main
